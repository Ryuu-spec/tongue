  }, true);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {

        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;

            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);

    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);

      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);

      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {

    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

"<!DOCTYPE html>\n<html lang=\"ko\"><head>\n<meta charset=\"utf-8\">\n<title>혀 모양 — ㄱ ㄴ<\u002Ftitle>\n<style>\n  html, body {\n    margin: 0;\n    height: 100%;\n    background: #f4efe9;\n    font-family: ui-sans-serif, system-ui, -apple-system, \"Apple SD Gothic Neo\", sans-serif;\n    overflow: hidden;\n    overscroll-behavior: none;\n  }\n  body {\n    -webkit-user-select: none;\n    user-select: none;\n  }\n\n  svg.canvas {\n    position: fixed;\n    inset: 0;\n    width: 100%;\n    height: 100%;\n    display: block;\n    touch-action: none;\n  }\n\n  /* control handles */\n  .handle {\n    fill: #ffffff;\n    stroke: #6e1018;\n    stroke-width: 1.5;\n    cursor: grab;\n    transition: transform 0.12s ease, fill 0.15s ease;\n    transform-origin: center;\n    transform-box: fill-box;\n  }\n  .handle:hover { fill: #ffe8ea; transform: scale(1.25); }\n  .handle.dragging { cursor: grabbing; fill: #6e1018; transform: scale(1.4); }\n  .handle.tip { stroke: #2a1115; stroke-dasharray: 2 2; }\n  .handle.base { fill: #2a1115; stroke: #2a1115; }\n\n  /* preset buttons */\n  .controls {\n    position: fixed;\n    bottom: 28px;\n    left: 50%;\n    transform: translateX(-50%);\n    display: flex;\n    gap: 12px;\n    z-index: 5;\n  }\n  .controls button {\n    appearance: none;\n    border: 1px solid rgba(60, 20, 25, 0.18);\n    background: rgba(255, 255, 255, 0.7);\n    backdrop-filter: blur(8px);\n    -webkit-backdrop-filter: blur(8px);\n    color: #2a1115;\n    font-family: \"Apple SD Gothic Neo\", \"Noto Sans KR\", system-ui, sans-serif;\n    font-size: 22px;\n    font-weight: 500;\n    width: 52px;\n    height: 52px;\n    border-radius: 16px;\n    cursor: pointer;\n    transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease;\n  }\n  .controls button:hover {\n    background: rgba(255, 255, 255, 0.95);\n    border-color: rgba(60, 20, 25, 0.4);\n    transform: translateY(-1px);\n  }\n  .controls button:active { transform: translateY(0); }\n  .control \"round\"><\u002Fpath>\n      <path id=\"bodyPath\" fill=\"none\" stroke=\"url(#bodyGrad)\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n    <\u002Fg>\n    <path id=\"glossPath\" fill=\"none\" stroke=\"url(#glossGrad)\" stroke-opacity=\"0.55\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n\n    <g id=\"specks\"><\u002Fg>\n\n    <!-- control handles drawn on top -->\n    <g id=\"handles\"><\u002Fg>\n  <\u002Fsvg>\n\n  <div class=\"hint\" id=\"hint\">drag the dots · 점을 움직여 혀를 구부리세요<\u002Fdiv>\n\n  <div class=\"controls\">\n    <button type=\"button\" data-letter=\"ㄱ\" aria-label=\"shape ㄱ\">ㄱ<\u002Fbutton>\n    <button type=\"button\" data-letter=\"ㄴ\" aria-label=\"shape ㄴ\">ㄴ<\u002Fbutton>\n    <button type=\"button\" class=\"reset\" id=\"resetBtn\" aria-label=\"reset\">reset<\u002Fbutton>\n  <\u002Fdiv>\n\n  <script>\n    (function () {\n      const SVGNS = 'http://www.w3.org/2000/svg';\n      const outer  = document.getElementById('outerPath');\n      const body   = document.getElementById('bodyPath');\n      const gloss  = document.getElementById('glossPath');\n      const shadow = document.getElementById('shadowPath');\n      const specks = document.getElementById('specks');\n      const handlesG = document.getElementById('handles');\n      const hint   = document.getElementById('hint');\n      const canvas = document.getElementById('canvas');\n\n      // ---------- model: 5 control points along the tongue spine ----------\n      // index 0 = base (root of tongue), last = tip\n      let points = [];\n      let interacted = false;\n\n      function defaultPoints() {\n        const W = window.innerWidth, H = window.innerHeight;\n        const cx = W / 2, cy = H / 2;\n        const span = Math.min(W * 0.5, 460);\n        return [\n          { x: cx - span * 0.5,  y: cy },\n          { x: cx - span * 0.25, y: cy },\n          { x: cx,               y: cy },\n          { x: cx + span * 0.25, y: cy },\n          { x: cx + span * 0.5,  y: cy },\n        ];\n      }\n\n      function presetPoints(letter) {\n        const W = window.innerWidth, H = window.innerHeight;\n        const cx = W / 2, cy = H / 2;\n        const w = Math.min(W * 0.42, 340);\n        const h = Math.min(H * 0.5, 340);\n        if (letter === 'ㄱ') {\n          // base on top-left, runs right, then turns down. tip at bottom-right.\n          return [\n            { x: cx - w / 2,           y: cy - h / 2 },        // base\n            { x: cx - w / 2 + w * 0.4, y: cy - h / 2 },        // along top\n            { x: cx + w / 2,           y: cy - h / 2 },        // top-right corner\n            { x: cx + w / 2,           y: cy - h / 2 + h * 0.5 }, // down right side\n            { x: cx + w / 2,           y: cy + h / 2 },        // tip\n          ];\n        }\n        if (letter === 'ㄴ') {\n          // base top-left, runs down, then turns right. tip bottom-right.\n          return [\n            { x: cx - w / 2, y: cy - h / 2 },                  // base\n            { x: cx - w / 2, y: cy - h / 2 + h * 0.4 },        // down\n            { x: cx - w / 2, y: cy + h / 2 },                  // bottom-left corner\n            { x: cx - w / 2 + w * 0.5, y: cy + h / 2 },        // along bottom\n            { x: cx + w / 2, y: cy + h / 2 },                  // tip\n          ];\n        }\n        return defaultPoints();\n      }\n\n      // smooth curve through points using midpoint-quadratic\n      function smoothPath(pts) {\n        if (pts.length === 0) return '';\n        if (pts.length === 1) return `M ${pts[0].x} ${pts[0].y} L ${pts[0].x + 0.1} ${pts[0].y + 0.1}`;\n        if (pts.length === 2) return `M ${pts[0].x} ${pts[0].y} L ${pts[1].x} ${pts[1].y}`;\n        let d = `M ${pts[0].x} ${pts[0].y}`;\n        for (let i = 1; i < pts.length - 1; i++) {\n          const xc = (pts[i].x + pts[i + 1].x) / 2;\n          const yc = (pts[i].y + pts[i + 1].y) / 2;\n          d += ` Q ${pts[i].x} ${pts[i].y} ${xc} ${yc}`;\n        }\n        const last = pts[pts.length - 1];\n        d += ` T ${last.x} ${last.y}`;\n        return d;\n      }\n\n      // tongue thickness tapers from base → tip\n      // We render multiple stroke layers; thickness is global per layer.\n      // To get a tapering tongue, segment the path and draw decreasing widths.\n      // Approach: split path into N sub-segments, each rendered as a short\n      // stroke at that segment's interpolated width. Body & outline only.\n      // But simpler & more organic: render full path with one width, and add\n      // a slimmer stroke near the tip on top to suggest tapering. We use 3\n      // overlaid full-length strokes plus a tip-only thinner cap.\n      // Below we just use 3 layers; filter \"organic\" supplies the wobble.\n\n      function setPath(d) {\n        const W = window.innerWidth, H = window.innerHeight;\n        // base thickness scales with viewport so the tongue feels right at any size\n        const baseW = Math.max(34, Math.min(64, Math.min(W, H) * 0.07));\n\n        outer.setAttribute('d', d);\n        body.setAttribute('d', d);\n        gloss.setAttribute('d', d);\n        shadow.setAttribute('d', d);\n\n        outer.setAttribute('stroke-width',  baseW + 6);\n        body.setAttribute('stroke-width',   baseW);\n        gloss.setAttribute('stroke-width',  baseW * 0.32);\n        shadow.setAttribute('stroke-width', baseW + 4);\n      }\n\n      function placeSpecks() {\n        specks.innerHTML = '';\n        const len = body.getTotalLength?.();\n        if (!len || len < 30) return;\n        const n = Math.min(28, Math.max(6, Math.floor(len / 55)));\n        for (let i = 0; i < n; i++) {\n          const t = (i + 0.5 + (Math.random() - 0.5) * 0.4) / n;\n          const p = body.getPointAtLength(Math.max(0, Math.min(len, t * len)));\n          const ang = Math.random() * Math.PI * 2;\n          const r  = Math.random() * 8;\n          const c = document.createElementNS(SVGNS, 'circle');\n          c.setAttribute('cx', p.x + Math.cos(ang) * r);\n          c.setAttribute('cy', p.y + Math.sin(ang) * r);\n          c.setAttribute('r', (0.9 + Math.random() * 1.3).toFixed(2));\n          c.setAttribute('fill', '#5e0a13');\n          c.setAttribute('opacity', (0.3 + Math.random() * 0.25).toFixed(2));\n          specks.appendChild(c);\n        }\n      }\n\n      // ---------- handles ----------\n      function renderHandles() {\n        handlesG.innerHTML = '';\n        points.forEach((p, i) => {\n          const c = document.createElementNS(SVGNS, 'circle');\n          c.setAttribute('cx', p.x);\n          c.setAttribute('cy', p.y);\n          c.setAttribute('r', i === 0 ? 7 : (i === points.length - 1 ? 6 : 6));\n          c.setAttribute('class', 'handle' + (i === 0 ? ' base' : '') + (i === points.length - 1 ? ' tip' : ''));\n          c.dataset.idx = i;\n          handlesG.appendChild(c);\n        });\n      }\n\n      function updateHandlePositions() {\n        [...handlesG.children].forEach((c, i) => {\n          c.setAttribute('cx', points[i].x);\n          c.setAttribute('cy', points[i].y);\n        });\n      }\n\n      function redraw() {\n        setPath(smoothPath(points));\n        placeSpecks();\n      }\n\n      // ---------- dragging ----------\n      let dragIdx = -1;\n      canvas.addEventListener('pointerdown', (e) => {\n        const t = e.target;\n        if (!t.classList || !t.classList.contains('handle')) return;\n        e.preventDefault();\n        dragIdx = +t.dataset.idx;\n        t.classList.add('dragging');\n        canvas.setPointerCapture?.(e.pointerId);\n        if (!interacted) { interacted = true; hint.classList.add('hidden'); }\n      });\n      canvas.addEventListener('pointermove', (e) => {\n        if (dragIdx < 0) return;\n        points[dragIdx] = { x: e.clientX, y: e.clientY };\n        updateHandlePositions();\n        // throttle specks while dragging — only update spine\n        setPath(smoothPath(points));\n      });\n      function end but leave point positions\n        setPath(smoothPath(points));\n      });\n    })();\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
