<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>혀 모양 — ㄱ ㄴ</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: "Apple SD Gothic Neo", "Noto Sans KR", ui-sans-serif, system-ui, sans-serif;
    user-select: none;
    -webkit-user-select: none;
  }

  #wrap {
    position: relative;
    width: 100%; height: 100%;
  }

  svg#canvas {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    display: block;
    touch-action: none;
    overflow: hidden;
  }

  /* handles */
  .handle {
    fill: #ffffff;
    stroke: #6e1018;
    stroke-width: 1.5;
    cursor: grab;
    transition: fill 0.15s ease;
  }
  .handle:hover  { fill: #ffe8ea; }
  .handle.drag   { cursor: grabbing; fill: #6e1018; }
  .handle.base   { fill: #2a1115; stroke: #2a1115; }
  .handle.tip    { stroke: #2a1115; stroke-dasharray: 3 3; }

  /* preset buttons */
  #controls {
    position: absolute;
    bottom: 10px;
    right: 10px;
    display: flex;
    gap: 6px;
    z-index: 5;
  }
  #controls button {
    appearance: none;
    border: 1px solid rgba(60, 20, 25, 0.22);
    background: rgba(255, 255, 255, 0.78);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: #2a1115;
    font-family: inherit;
    font-size: clamp(13px, 3.5vmin, 18px);
    font-weight: 500;
    width:  clamp(30px, 8vmin, 42px);
    height: clamp(30px, 8vmin, 42px);
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s, transform 0.12s;
  }
  #controls button:hover  { background: rgba(255,255,255,0.97); transform: translateY(-1px); }
  #controls button:active { transform: translateY(0); }
  #controls #resetBtn {
    width: auto;
    padding: 0 clamp(6px, 1.5vmin, 11px);
    font-size: clamp(8px, 2vmin, 10px);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(60, 20, 25, 0.5);
  }
</style>
</head>
<body>
<div id="wrap">
  <svg id="canvas" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="gBody" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="#ff5862"/>
        <stop offset="55%"  stop-color="#e02333"/>
        <stop offset="100%" stop-color="#a8121d"/>
      </linearGradient>
      <linearGradient id="gGloss" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="#ffe1e4" stop-opacity="0.9"/>
        <stop offset="100%" stop-color="#ffadb4" stop-opacity="0"/>
      </linearGradient>
      <filter id="fOrganic" x="-15%" y="-15%" width="130%" height="130%">
        <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="4" result="n"/>
        <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6"/>
      </filter>
    </defs>

    <!-- drop shadow -->
    <path id="pShadow" fill="none" stroke="rgba(110,16,24,0.18)"
          stroke-linecap="round" stroke-linejoin="round"
          style="filter:blur(6px)" transform="translate(0,7)"/>

    <!-- body (organic filter) -->
    <g filter="url(#fOrganic)">
      <path id="pOuter" fill="none" stroke="#6e1018"        stroke-linecap="round" stroke-linejoin="round"/>
      <path id="pBody"  fill="none" stroke="url(#gBody)"    stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- gloss -->
    <path id="pGloss" fill="none" stroke="url(#gGloss)" stroke-opacity="0.55"
          stroke-linecap="round" stroke-linejoin="round"/>

    <g id="gSpecks"></g>
    <g id="gHandles"></g>
  </svg>

  <div id="controls">
    <button id="resetBtn" aria-label="초기화">reset</button>
  </div>
</div>

<script>
(function () {
  'use strict';

  const NS      = 'http://www.w3.org/2000/svg';
  const canvas  = document.getElementById('canvas');
  const wrap    = document.getElementById('wrap');
  const pOuter  = document.getElementById('pOuter');
  const pBody   = document.getElementById('pBody');
  const pGloss  = document.getElementById('pGloss');
  const pShadow = document.getElementById('pShadow');
  const gSpecks = document.getElementById('gSpecks');
  const gHandles= document.getElementById('gHandles');

  let pts = [], dragIdx = -1, tweenRAF = 0;

  /* ── dimensions + safe zone ──────────────────────── */
  function W() { return wrap.offsetWidth  || window.innerWidth;  }
  function H() { return wrap.offsetHeight || window.innerHeight; }
  // PAD: stroke half-width (~35) + filter displacement (~12) + margin
  const PAD = 48;

  /* ── point sets ──────────────────────────────────── */
  function defPts() {
    const cx = W()/2;
    const cy = (PAD + (H() - PAD)) / 2;          // vertically centred in safe zone
    const span = Math.min(W() * 0.52 - PAD, 380);
    return [
      { x: cx - span*.50, y: cy },
      { x: cx - span*.25, y: cy },
      { x: cx,            y: cy },
      { x: cx + span*.25, y: cy },
      { x: cx + span*.50, y: cy },
    ];
  }

  /* ── smooth curve ────────────────────────────────── */
  function curve(p) {
    if (!p || p.length < 2) return '';
    if (p.length === 2) return `M${p[0].x} ${p[0].y} L${p[1].x} ${p[1].y}`;
    let d = `M${p[0].x} ${p[0].y}`;
    for (let i = 1; i < p.length - 1; i++) {
      const mx = (p[i].x + p[i+1].x) / 2;
      const my = (p[i].y + p[i+1].y) / 2;
      d += ` Q${p[i].x} ${p[i].y} ${mx} ${my}`;
    }
    return d + ` T${p[p.length-1].x} ${p[p.length-1].y}`;
  }

  /* ── stroke widths scale with viewport ───────────── */
  function applyStrokes(d) {
    const bw = Math.max(28, Math.min(62, Math.min(W(), H()) * 0.072));
    pOuter .setAttribute('d', d); pOuter .setAttribute('stroke-width', bw + 6);
    pBody  .setAttribute('d', d); pBody  .setAttribute('stroke-width', bw);
    pGloss .setAttribute('d', d); pGloss .setAttribute('stroke-width', bw * 0.30);
    pShadow.setAttribute('d', d); pShadow.setAttribute('stroke-width', bw + 4);
  }

  /* ── texture specks ──────────────────────────────── */
  function placeSpecks() {
    gSpecks.innerHTML = '';
    const len = pBody.getTotalLength?.();
    if (!len || len < 20) return;
    const n = Math.min(28, Math.max(5, Math.floor(len / 54)));
    for (let i = 0; i < n; i++) {
      const t = (i + .5 + (Math.random() - .5) * .4) / n;
      const p = pBody.getPointAtLength(t * len);
      const a = Math.random() * Math.PI * 2, r = Math.random() * 8;
      const c = document.createElementNS(NS, 'circle');
      c.setAttribute('cx', p.x + Math.cos(a) * r);
      c.setAttribute('cy', p.y + Math.sin(a) * r);
      c.setAttribute('r',  (0.8 + Math.random() * 1.4).toFixed(2));
      c.setAttribute('fill', '#5e0a13');
      c.setAttribute('opacity', (0.28 + Math.random() * .26).toFixed(2));
      gSpecks.appendChild(c);
    }
  }

  /* ── handles ─────────────────────────────────────── */
  function buildHandles() {
    gHandles.innerHTML = '';
    pts.forEach((p, i) => {
      const c = document.createElementNS(NS, 'circle');
      c.setAttribute('cx', p.x);
      c.setAttribute('cy', p.y);
      c.setAttribute('r',  i === 0 ? 8 : 7);
      let cl = 'handle';
      if (i === 0)              cl += ' base';
      if (i === pts.length - 1) cl += ' tip';
      c.setAttribute('class', cl);
      c.dataset.i = i;
      gHandles.appendChild(c);
    });
  }

  function syncHandles() {
    [...gHandles.children].forEach((c, i) => {
      c.setAttribute('cx', pts[i].x);
      c.setAttribute('cy', pts[i].y);
    });
  }

  function redraw() { applyStrokes(curve(pts)); placeSpecks(); }

  /* ── SVG coordinate conversion ───────────────────── */
  function svgPt(e) {
    const pt = canvas.createSVGPoint();
    pt.x = e.clientX; pt.y = e.clientY;
    const ctm = canvas.getScreenCTM();
    return ctm ? pt.matrixTransform(ctm.inverse()) : pt;
  }

  /* ── drag ────────────────────────────────────────── */
  canvas.addEventListener('pointerdown', e => {
    const el = e.target;
    if (el.dataset.i === undefined) return;
    e.preventDefault();
    dragIdx = +el.dataset.i;
    el.classList.add('drag');
    canvas.setPointerCapture(e.pointerId);
  });

  canvas.addEventListener('pointermove', e => {
    if (dragIdx < 0) return;
    const sp = svgPt(e);
    pts[dragIdx] = { x: sp.x, y: sp.y };
    syncHandles();
    applyStrokes(curve(pts));
  });

  function endDrag() {
    if (dragIdx < 0) return;
    const el = gHandles.children[dragIdx];
    if (el) el.classList.remove('drag');
    dragIdx = -1;
    placeSpecks();
  }
  canvas.addEventListener('pointerup',    endDrag);
  canvas.addEventListener('pointercancel', endDrag);

  /* ── tween ───────────────────────────────────────── */
  function tweenTo(target, dur = 640) {
    cancelAnimationFrame(tweenRAF);
    const from = pts.map(p => ({ ...p }));
    const t0 = performance.now();
    const ease = t => t < .5 ? 4*t*t*t : 1 - (-2*t+2)**3/2;
    (function step(now) {
      const k = Math.min(1, (now - t0) / dur);
      const e = ease(k);
      pts.forEach((p, i) => {
        p.x = from[i].x + (target[i].x - from[i].x) * e;
        p.y = from[i].y + (target[i].y - from[i].y) * e;
      });
      syncHandles();
      applyStrokes(curve(pts));
      if (k < 1) tweenRAF = requestAnimationFrame(step);
      else placeSpecks();
    })(t0);
  }

  /* ── buttons ─────────────────────────────────────── */
  document.getElementById('resetBtn').addEventListener('click', () => tweenTo(defPts()));

  /* ── resize ──────────────────────────────────────── */
  const ro = new ResizeObserver(() => applyStrokes(curve(pts)));
  ro.observe(wrap);

  window.addEventListener('resize', () => applyStrokes(curve(pts)));

  /* ── init ────────────────────────────────────────── */
  requestAnimationFrame(() => {
    pts = defPts();
    buildHandles();
    redraw();
  });
})();
</script>
</body>
</html>
