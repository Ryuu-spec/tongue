<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>혀 모양</title>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%; background:transparent; overflow:hidden;
    font-family:"Apple SD Gothic Neo","Noto Sans KR",ui-sans-serif,sans-serif;
    user-select:none; -webkit-user-select:none;
  }
  #wrap { position:relative; width:100%; height:100%; }
  svg#canvas {
    position:absolute; inset:0; width:100%; height:100%;
    display:block; touch-action:none; overflow:hidden;
  }

  /* ── 공통 핸들 ── */
  .handle {
    cursor:grab; transition:r .12s, opacity .15s;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,.22));
  }
  .handle:hover   { opacity:.85; }
  .handle.dragging { cursor:grabbing; }

  /* 혀끝 (tip) — 점선 */
  .handle.tip  { fill:#fff; stroke:#333; stroke-width:1.5; stroke-dasharray:3 2.5; }

  /* 뿌리 (base) — 검정 */
  .handle.base { fill:#1e1e1e; stroke:#1e1e1e; stroke-width:1.5; }

  /* 등쪽 (dorsal) — 파랑 */
  .handle.dors { fill:#cce4ff; stroke:#1a5fa8; stroke-width:1.5; }
  .handle.dors.dragging { fill:#1a5fa8; }

  /* 배쪽 (ventral) — 초록 */
  .handle.vent { fill:#ccf5d4; stroke:#1a7a30; stroke-width:1.5; }
  .handle.vent.dragging { fill:#1a7a30; }

  /* ── 범례 ── */
  #legend {
    position:absolute; top:10px; left:10px;
    display:flex; flex-direction:column; gap:5px;
    font-size:clamp(9px,1.8vmin,12px); color:#333;
    background:rgba(255,255,255,.75); backdrop-filter:blur(8px);
    padding:7px 10px; border-radius:10px;
    border:1px solid rgba(0,0,0,.08);
    pointer-events:none;
  }
  .leg { display:flex; align-items:center; gap:6px; }
  .dot {
    width:10px; height:10px; border-radius:50%; flex-shrink:0;
    border:1.5px solid;
  }
  .dot.dors { background:#cce4ff; border-color:#1a5fa8; }
  .dot.vent { background:#ccf5d4; border-color:#1a7a30; }
  .dot.tip  { background:#fff; border-color:#333;
    background-image: repeating-linear-gradient(45deg,#333 0,#333 1.5px,transparent 0,transparent 4px); }
  .dot.base { background:#1e1e1e; border-color:#1e1e1e; }

  /* ── 리셋 버튼 ── */
  #controls {
    position:absolute; bottom:10px; right:10px; z-index:5;
  }
  #resetBtn {
    appearance:none; border:1px solid rgba(60,20,25,.22);
    background:rgba(255,255,255,.78); backdrop-filter:blur(10px);
    color:rgba(60,20,25,.55); font-family:inherit;
    font-size:clamp(8px,2vmin,10px); letter-spacing:.12em;
    text-transform:uppercase; padding:0 clamp(7px,1.8vmin,12px);
    height:clamp(26px,7vmin,36px); border-radius:9px;
    cursor:pointer; transition:background .15s, transform .12s;
  }
  #resetBtn:hover  { background:rgba(255,255,255,.97); transform:translateY(-1px); }
  #resetBtn:active { transform:translateY(0); }
</style>
</head>
<body>
<div id="wrap">
  <svg id="canvas" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="gBody" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="#ff6b72"/>
        <stop offset="45%"  stop-color="#df2233"/>
        <stop offset="100%" stop-color="#98101b"/>
      </linearGradient>
      <linearGradient id="gGloss" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="#ffeced" stop-opacity=".9"/>
        <stop offset="100%" stop-color="#ffb8bc" stop-opacity="0"/>
      </linearGradient>
      <filter id="fOrg" x="-15%" y="-15%" width="130%" height="130%">
        <feTurbulence type="fractalNoise" baseFrequency=".013" numOctaves="2" seed="7" result="n"/>
        <feDisplacementMap in="SourceGraphic" in2="n" scale="1.4"/>
      </filter>
    </defs>

    <!-- 그림자 -->
    <path id="pShadow" style="filter:blur(10px)" transform="translate(4,12)"/>

    <!-- 혀 본체 (organic filter) -->
    <g filter="url(#fOrg)">
      <path id="pBody"/>
    </g>

    <!-- 등쪽 글로스 하이라이트 -->
    <path id="pGloss" fill="none" stroke-linecap="round"/>

    <!-- 질감 점들 -->
    <g id="gSpecks"/>

    <!-- 히든 등쪽 곡선 (점 분산용) -->
    <path id="pSpine" fill="none" stroke="none" visibility="hidden"/>

    <!-- 핸들 -->
    <g id="gHandles"/>
  </svg>

  <div id="legend">
    <div class="leg"><div class="dot dors"></div><span>등쪽 (dorsal)</span></div>
    <div class="leg"><div class="dot vent"></div><span>배쪽 (ventral)</span></div>
    <div class="leg"><div class="dot tip"></div><span>혀끝</span></div>
    <div class="leg"><div class="dot base"></div><span>혀뿌리</span></div>
  </div>

  <div id="controls">
    <button id="resetBtn">reset</button>
  </div>
</div>

<script>
(function () {
  'use strict';

  const NS      = 'http://www.w3.org/2000/svg';
  const canvas  = document.getElementById('canvas');
  const wrap    = document.getElementById('wrap');
  const pBody   = document.getElementById('pBody');
  const pGloss  = document.getElementById('pGloss');
  const pShadow = document.getElementById('pShadow');
  const pSpine  = document.getElementById('pSpine');
  const gSpecks = document.getElementById('gSpecks');
  const gHandles= document.getElementById('gHandles');

  const PAD = 48;
  function W() { return wrap.offsetWidth  || window.innerWidth;  }
  function H() { return wrap.offsetHeight || window.innerHeight; }

  /* ── 상태 ─────────────────────────────────────────── */
  // tip: 혀끝 (왼쪽), base: 혀뿌리 (오른쪽)
  // d[0..4]: 등쪽 5개 제어점
  // v[0..4]: 배쪽 5개 제어점
  let S = { tip:{x:0,y:0}, base:{x:0,y:0}, d:[], v:[] };
  let drag = null;  // { type:'tip'|'base'|'d'|'v', i:number }
  let tweenRAF = 0;

  /* ── 기본 위치 계산 ───────────────────────────────── */
  function makeDefault() {
    const cx = W()/2, cy = H()/2;
    const span = Math.min(W()*.52 - PAD, 380);

    // 혀끝: 왼쪽 + 살짝 아래 (구강 단면 기준 입술 쪽)
    const tx = cx - span * .48;
    const ty = cy + span * .10;
    // 혀뿌리: 오른쪽 + 약간 위 (인두 방향, 실제 혀 기울기 반영)
    const bx = cx + span * .48;
    const by = cy - span * .03;

    const ts = [0.14, 0.30, 0.50, 0.68, 0.85];

    // 등쪽: 구개 방향으로 크게 솟는 아치 (레퍼런스 기준 과감하게)
    const dOff = [0.18, 0.32, 0.38, 0.35, 0.28];
    const d = ts.map((t, i) => ({
      x: tx + (bx - tx) * t,
      y: ty + (by - ty) * t - span * dOff[i],
    }));

    // 배쪽: 앞쪽 거의 수평, 뿌리 쪽 살짝 처짐 (구강저 반영)
    const vOff = [0.01, 0.03, 0.05, 0.08, 0.10];
    const v = ts.map((t, i) => ({
      x: tx + (bx - tx) * t,
      y: ty + (by - ty) * t + span * vOff[i],
    }));

    return { tip:{x:tx, y:ty}, base:{x:bx, y:by}, d, v };
  }

  /* ── Q 세그먼트 (현재 위치에서 pts 끝까지 부드럽게) ── */
  function qSeg(pts) {
    let s = '';
    for (let i = 1; i < pts.length - 1; i++) {
      const mx = (pts[i].x + pts[i+1].x) / 2;
      const my = (pts[i].y + pts[i+1].y) / 2;
      s += ` Q${pts[i].x} ${pts[i].y} ${mx} ${my}`;
    }
    return s + ` T${pts[pts.length-1].x} ${pts[pts.length-1].y}`;
  }

  /* ── 혀 윤곽 경로 ─────────────────────────────────── */
  function tonguePath({ tip, base, d, v }) {
    const n = d.length;

    // 등쪽: tip → d[0..4]
    let path = `M${tip.x} ${tip.y}`;
    path += qSeg([tip, ...d]);

    // 뿌리 캡: d[4] → (Q, base 너머로 불룩) → v[4]
    const ctrlX = base.x + (base.x - d[n-1].x) * 0.55;
    const ctrlY = (d[n-1].y + v[n-1].y) / 2;
    path += ` Q${ctrlX} ${ctrlY} ${v[n-1].x} ${v[n-1].y}`;

    // 배쪽: v[4..0] → tip
    path += qSeg([...v].reverse());

    return path + ' Z';
  }

  /* ── 등쪽 곡선만 (글로스용) ──────────────────────── */
  function dorsalPath({ tip, d }) {
    return `M${tip.x} ${tip.y}` + qSeg([tip, ...d]);
  }

  /* ── 렌더 ─────────────────────────────────────────── */
  function render(s) {
    const tp = tonguePath(s);
    const dp = dorsalPath(s);

    pBody.setAttribute('d',               tp);
    pBody.setAttribute('fill',            'url(#gBody)');
    pBody.setAttribute('stroke',          '#5a0912');
    pBody.setAttribute('stroke-width',    '3');
    pBody.setAttribute('stroke-linejoin', 'round');

    pShadow.setAttribute('d',    tp);
    pShadow.setAttribute('fill', 'rgba(60,0,6,.38)');

    const gw = Math.max(10, Math.min(22, Math.min(W(),H()) * .028));
    pGloss.setAttribute('d',              dp);
    pGloss.setAttribute('stroke',         'url(#gGloss)');
    pGloss.setAttribute('stroke-width',   gw);
    pGloss.setAttribute('stroke-opacity', '.5');

    pSpine.setAttribute('d', dp);
  }

  /* ── 질감 점 ──────────────────────────────────────── */
  function placeSpecks() {
    gSpecks.innerHTML = '';
    const len = pSpine.getTotalLength?.();
    if (!len || len < 10) return;
    const n = Math.min(28, Math.max(5, Math.floor(len / 50)));
    for (let i = 0; i < n; i++) {
      const t = (i + .5 + (Math.random()-.5)*.4) / n;
      const p = pSpine.getPointAtLength(t * len);
      const a = Math.random() * Math.PI * 2;
      const r = Math.random() * 12;
      const c = document.createElementNS(NS, 'circle');
      c.setAttribute('cx',      p.x + Math.cos(a)*r);
      c.setAttribute('cy',      p.y + Math.sin(a)*r);
      c.setAttribute('r',       (0.8 + Math.random()*1.4).toFixed(2));
      c.setAttribute('fill',    '#5a0a12');
      c.setAttribute('opacity', (0.22 + Math.random()*.24).toFixed(2));
      gSpecks.appendChild(c);
    }
  }

  /* ── 핸들 빌드 ────────────────────────────────────── */
  function buildHandles(s) {
    gHandles.innerHTML = '';

    const add = (p, cls, type, i) => {
      const c = document.createElementNS(NS, 'circle');
      c.setAttribute('cx', p.x); c.setAttribute('cy', p.y);
      c.setAttribute('r',  cls === 'base' ? 8 : cls === 'tip' ? 7 : 6);
      c.setAttribute('class', `handle ${cls}`);
      c.dataset.type = type;
      if (i !== undefined) c.dataset.i = i;
      gHandles.appendChild(c);
    };

    // 등쪽 (파랑)
    s.d.forEach((p, i) => add(p, 'dors', 'd', i));
    // 배쪽 (초록)
    s.v.forEach((p, i) => add(p, 'vent', 'v', i));
    // 혀끝, 뿌리
    add(s.tip,  'tip',  'tip');
    add(s.base, 'base', 'base');
  }

  function syncHandles(s) {
    [...gHandles.children].forEach(c => {
      const type = c.dataset.type, i = +c.dataset.i;
      const p = type === 'tip'  ? s.tip
              : type === 'base' ? s.base
              : type === 'd'    ? s.d[i]
              :                   s.v[i];
      c.setAttribute('cx', p.x); c.setAttribute('cy', p.y);
    });
  }

  function redraw() { render(S); placeSpecks(); }

  /* ── SVG 좌표 변환 ────────────────────────────────── */
  function svgPt(e) {
    const pt = canvas.createSVGPoint();
    pt.x = e.clientX; pt.y = e.clientY;
    const ctm = canvas.getScreenCTM();
    return ctm ? pt.matrixTransform(ctm.inverse()) : pt;
  }

  /* ── 드래그 ───────────────────────────────────────── */
  canvas.addEventListener('pointerdown', e => {
    const el = e.target;
    if (!el.dataset.type) return;
    e.preventDefault();
    drag = { type: el.dataset.type, i: +el.dataset.i };
    el.classList.add('dragging');
    canvas.setPointerCapture(e.pointerId);
  });

  canvas.addEventListener('pointermove', e => {
    if (!drag) return;
    const sp = svgPt(e);
    if      (drag.type === 'tip')  S.tip    = { x:sp.x, y:sp.y };
    else if (drag.type === 'base') S.base   = { x:sp.x, y:sp.y };
    else if (drag.type === 'd')    S.d[drag.i] = { x:sp.x, y:sp.y };
    else                           S.v[drag.i] = { x:sp.x, y:sp.y };
    syncHandles(S);
    render(S);
  });

  function endDrag(e) {
    if (!drag) return;
    // 해당 핸들 class 복원
    [...gHandles.children].forEach(c => {
      if (c.dataset.type === drag.type &&
          (drag.type === 'tip' || drag.type === 'base' || +c.dataset.i === drag.i))
        c.classList.remove('dragging');
    });
    drag = null;
    placeSpecks();
  }
  canvas.addEventListener('pointerup',     endDrag);
  canvas.addEventListener('pointercancel', endDrag);

  /* ── 트윈 ─────────────────────────────────────────── */
  function cloneS(s) {
    return {
      tip:  { ...s.tip },
      base: { ...s.base },
      d:    s.d.map(p => ({ ...p })),
      v:    s.v.map(p => ({ ...p })),
    };
  }

  function tweenTo(target, dur = 640) {
    cancelAnimationFrame(tweenRAF);
    const from = cloneS(S);
    const t0   = performance.now();
    const ease = t => t < .5 ? 4*t**3 : 1-(-2*t+2)**3/2;

    (function step(now) {
      const k = Math.min(1, (now - t0) / dur);
      const e = ease(k);
      const lerp = (a, b) => ({ x: a.x+(b.x-a.x)*e, y: a.y+(b.y-a.y)*e });

      S.tip  = lerp(from.tip,  target.tip);
      S.base = lerp(from.base, target.base);
      S.d    = from.d.map((p, i) => lerp(p, target.d[i]));
      S.v    = from.v.map((p, i) => lerp(p, target.v[i]));

      syncHandles(S); render(S);
      if (k < 1) tweenRAF = requestAnimationFrame(step);
      else placeSpecks();
    })(t0);
  }

  /* ── 리셋 ─────────────────────────────────────────── */
  document.getElementById('resetBtn').addEventListener('click', () => {
    tweenTo(makeDefault());
  });

  /* ── 리사이즈 ─────────────────────────────────────── */
  const ro = new ResizeObserver(() => render(S));
  ro.observe(wrap);
  window.addEventListener('resize', () => render(S));

  /* ── 초기화 ───────────────────────────────────────── */
  requestAnimationFrame(() => {
    S = makeDefault();
    buildHandles(S);
    redraw();
  });
})();
</script>
</body>
</html>
